<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>访问统计</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f5f7f9;color:#172033;font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    header{background:#fff;border-bottom:1px solid #e5e7eb;padding:18px 28px}h1{font-size:22px;margin:0 0 4px}.muted{color:#6b7280}
    main{max-width:1120px;margin:auto;padding:24px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
    .card,section{background:#fff;border:1px solid #e5e7eb;border-radius:8px}.card{padding:18px}.label{color:#6b7280}.value{font-size:30px;font-weight:750;margin-top:8px}
    .grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}h2{font-size:16px;margin:0;padding:14px 16px;border-bottom:1px solid #e5e7eb}
    table{border-collapse:collapse;width:100%}th,td{border-bottom:1px solid #e5e7eb;padding:11px 16px;text-align:left}th{background:#f8fafc;color:#64748b;font-size:12px}
    .bar{background:#8ec43c;border-radius:999px;height:8px;min-width:4px}.error{color:#b91c1c;padding:20px}
    @media(max-width:760px){.metrics,.grid{grid-template-columns:1fr}}
  </style>
  <script>
    (async()=>{try{const r=await fetch('/api/v1/auths/',{credentials:'same-origin'});const u=r.ok?await r.json():null;if(u?.role!=='admin')location.replace('/auth?redirect='+encodeURIComponent(location.pathname))}catch(_){location.replace('/auth')}})();
  </script>
</head>
<body>
  <header><h1>访问统计</h1><div class="muted">外部访客端每日访问与咨询概况</div></header>
  <main>
    <div class="metrics">
      <div class="card"><div class="label">今日访问量</div><div class="value" id="visits">0</div></div>
      <div class="card"><div class="label">今日独立访客</div><div class="value" id="visitors">0</div></div>
      <div class="card"><div class="label">今日咨询量</div><div class="value" id="consultations">0</div></div>
    </div>
    <div class="grid">
      <section><h2>每日趋势</h2><table><thead><tr><th>日期</th><th>访问量</th><th>独立访客</th><th>咨询量</th></tr></thead><tbody id="days"></tbody></table></section>
      <section><h2>咨询语言分布</h2><table><thead><tr><th>语言</th><th>数量</th><th>占比</th></tr></thead><tbody id="languages"></tbody></table></section>
    </div>
  </main>
  <script>
    const ymd=()=>{const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`};
    const liveStatsUrl = location.hostname === 'qa-admin.gmktec.cn'
      ? 'https://qa.gmktec.cn/analytics-api/analytics/stats'
      : `${location.origin}/analytics-api/analytics/stats`;
    async function load(){
      try{
        let r=await fetch(liveStatsUrl,{cache:'no-store'});
        if(!r.ok) r=await fetch(`/static/analytics/access-analytics.json?_=${Date.now()}`,{cache:'no-store'});
        if(!r.ok)throw new Error('stats unavailable');
        const data=await r.json();const current=data.days.find(x=>x.day===ymd())||{};
        visits.textContent=current.visits||0;visitors.textContent=current.visitors||0;consultations.textContent=current.consultations||0;
        days.innerHTML=data.days.map(x=>`<tr><td>${x.day}</td><td>${x.visits}</td><td>${x.visitors}</td><td>${x.consultations}</td></tr>`).join('')||'<tr><td colspan="4">暂无数据</td></tr>';
        const total=data.languages.reduce((n,x)=>n+x.count,0)||1;
        languages.innerHTML=data.languages.map(x=>`<tr><td>${x.language}</td><td>${x.count}</td><td><div class="bar" style="width:${Math.max(4,x.count/total*100)}%"></div></td></tr>`).join('')||'<tr><td colspan="3">暂无数据</td></tr>';
      }catch(_){document.querySelector('main').innerHTML='<div class="error">统计数据尚未生成，请等待一分钟后刷新。</div>'}
    }
    load();setInterval(load,60000);
  </script>
</body>
</html>
